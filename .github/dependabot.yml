version: 2
updates:
  - package-ecosystem: github-actions
    # maintain workflows in the default location (/.github/workflows/)
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
